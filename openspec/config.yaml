schema: spec-driven

# Project context — shown to AI when creating artifacts
context: |
  ## 技術スタック
  - Framework: Next.js 16 (App Router, Turbopack)
  - Language: TypeScript 6 (strict mode)
  - Runtime: Bun (package manager: pnpm)
  - UI: React 19, CSS Modules, Recharts (v3)
  - State: Redux Toolkit (@reduxjs/toolkit)
  - Data処理: Arquero (table transform), PapaParse (CSV), xlsx (Excel)
  - Testing: Vitest, @testing-library/react, happy-dom
  - Lint/Format: ESLint, Oxlint, Oxfmt, Prettier
  - Pre-commit: Husky + lint-staged

  ## プロジェクト構造
  - src/app/ — App Router pages/layouts (RSC)
  - src/app/components/ — UI components (charts, filters, legends)
  - src/app/api/ — API route handlers
  - src/hooks/ — Client-side custom hooks
  - src/lib/ — Client utility modules
  - src/types/ — TypeScript type definitions
  - server/lib/ — Server-only logic (data loading, processing)
  - scripts/ — Data conversion scripts (Python→TS migration済)
  - public/ — Static CSV data files
  - tests/ — Test suites (unit, integration, component)

  ## ドメイン知識
  - 日本の経済指標ダッシュボード：CPI（消費者物価指数）、CTI（景気動向指数）、賃金統計（所定内・所定外・総実労働時間）、人口統計
  - データソース：政府統計CSV（e-Stat等）をスクリプトで加工 → public/ 配下に配置
  - 指標は2020年基準でスケール統一、長期推移を可視化
  - 各種グラフは凡例クリックで系列の表示/非表示を切り替え可能

  ## コーディング規約
  - TypeScript strict mode、any 禁止
  - 関数コンポーネント、明示的な戻り値の型
  - CSS Modules でスタイリング（.module.css）
  - サーバーコンポーネント優先、クライアントコンポーネントは "use client" を明示
  - テストは Vitest + Testing Library、各コンポーネント・ユーティリティの動作をカバー
  - import パスは @/（src/）と @server/（server/）のエイリアスを使用

# Per-artifact rules
rules:
  proposal:
    - Write in Japanese or English based on request language
    - Include "Purpose", "Requirements" with concrete scenarios (Gherkin形式)
    - Include "Data Model" section when adding/modifying data structures
    - Include "Non-goals" section to clarify scope boundaries
    - Keep proposals under 1000 words unless complexity demands more
  tasks:
    - Break tasks into chunks of max 2 hours
    - Each task must have a clear acceptance criterion
    - Prefer small, independent PRs over large monolithic changes
    - Include test considerations in each task
  spec:
    - Each requirement must have at least one Scenario (WHEN/THEN)
    - Non-functional requirements (performance, accessibility) should be explicitly stated
    - Data models should reference actual TypeScript types in src/types/
    - UI specifications should reference component names in src/app/components/
